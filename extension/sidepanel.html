<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nano Chat</title>
    <style>
      :root {
        --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280;
        --user-bg: #2563eb; --user-fg: #ffffff;
        --bot-bg: #f1f3f5; --bot-fg: #1a1a1a;
        --border: #e5e7eb; --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #17181c; --fg: #e8eaed; --muted: #9aa0a6;
          --user-bg: #2563eb; --user-fg: #ffffff;
          --bot-bg: #26282e; --bot-fg: #e8eaed;
          --border: #33353b; --accent: #4f8cff;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column;
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg); color: var(--fg);
      }
      header {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 12px; border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 14px; font-weight: 600; margin: 0; flex: 1; }
      #status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      #dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
      #dot.up { background: #22c55e; } #dot.down { background: #ef4444; }
      #log { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 88%; padding: 8px 11px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
      .user { align-self: flex-end; background: var(--user-bg); color: var(--user-fg); border-bottom-right-radius: 4px; }
      .bot  { align-self: flex-start; background: var(--bot-bg); color: var(--bot-fg); border-bottom-left-radius: 4px; }
      .bot.pending::after { content: "▍"; animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .meta { align-self: center; font-size: 11px; color: var(--muted); }
      .err  { align-self: center; font-size: 12px; color: #ef4444; text-align: center; }
      footer { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
      #input {
        flex: 1; resize: none; max-height: 120px; padding: 8px 10px;
        border: 1px solid var(--border); border-radius: 8px;
        background: var(--bg); color: var(--fg); font: inherit;
      }
      #input:focus { outline: none; border-color: var(--accent); }
      #send {
        padding: 0 14px; border: none; border-radius: 8px;
        background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
      }
      #send:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <header>
      <h1>Nano Chat</h1>
      <div id="status"><span id="dot"></span><span id="statusText">connecting…</span></div>
    </header>
    <div id="log"></div>
    <footer>
      <textarea id="input" rows="1" placeholder="Message Gemini Nano…" disabled></textarea>
      <button id="send" disabled>Send</button>
    </footer>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
